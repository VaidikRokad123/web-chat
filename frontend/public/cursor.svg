  <line x1="16" y1="20" x2="16" y2="28" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="12" y2="16" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
